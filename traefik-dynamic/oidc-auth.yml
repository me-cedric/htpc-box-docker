http:
  middlewares:
    # Admin-only access — requires membership in "credentials-admin" group
    oidc-auth-admin:
      plugin:
        traefik-oidc-auth:
          Secret: "{{ env "OIDC_SECRET" }}"
          Provider:
            Url: "https://auth.{{ env "SERVERNAME" }}"
            ClientId: "{{ env "OIDC_CLIENT_ID" }}"
            ClientSecret: "{{ env "OIDC_CLIENT_SECRET" }}"
          Scopes:
            - openid
            - profile
            - email
            - groups
          Headers:
            - Name: "X-Forwarded-Groups"
              Value: '{{"{{"}} index .claims "groups" | mapToJsonArray {{"}}"}}'
            - Name: "X-Forwarded-User"
              Value: '{{"{{"}} index .claims "sub" {{"}}"}}'
            - Name: "X-Forwarded-Preferred-Username"
              Value: '{{"{{"}} index .claims "preferred_username" {{"}}"}}'
            - Name: "X-Forwarded-Email"
              Value: '{{"{{"}} index .claims "email" {{"}}"}}'
          LogoutUri: "/logout"
          PostLogoutRedirectUri: "https://dashboard.{{ env "SERVERNAME" }}"
          Authorization:
            AssertClaims:
              - Name: "groups"
                AnyOf:
                  - "credentials-admin"

    # User access — requires membership in "credentials-admin", "requester", or "user" group
    oidc-auth-user:
      plugin:
        traefik-oidc-auth:
          Secret: "{{ env "OIDC_SECRET" }}"
          Provider:
            Url: "https://auth.{{ env "SERVERNAME" }}"
            ClientId: "{{ env "OIDC_CLIENT_ID" }}"
            ClientSecret: "{{ env "OIDC_CLIENT_SECRET" }}"
          Scopes:
            - openid
            - profile
            - email
            - groups
          Headers:
            - Name: "X-Forwarded-Groups"
              Value: '{{"{{"}} index .claims "groups" | mapToJsonArray {{"}}"}}'
            - Name: "X-Forwarded-User"
              Value: '{{"{{"}} index .claims "sub" {{"}}"}}'
            - Name: "X-Forwarded-Preferred-Username"
              Value: '{{"{{"}} index .claims "preferred_username" {{"}}"}}'
            - Name: "X-Forwarded-Email"
              Value: '{{"{{"}} index .claims "email" {{"}}"}}'
          LogoutUri: "/logout"
          PostLogoutRedirectUri: "https://dashboard.{{ env "SERVERNAME" }}"
          Authorization:
            AssertClaims:
              - Name: "groups"
                AnyOf:
                  - "credentials-admin"
                  - "requester"
                  - "user"
