server:
  hostname: auth.yourdomain.com
  port: 4181
  basePath: /forward

logs:
  level: info

cookies:
  domain: yourdomain.com
  namePrefix: forward-auth

tokens:
  signingKey: "same as cookie from env vars"
  # Long session so you stay logged in without the site open
  sessionLifetime: 720h
  # Re-check token validity with PocketID every 5 min
  # Logout from PocketID → forward-auth detects revocation within 5 min
  tokenRefreshInterval: 5m

logout:
  # When user logs out via forward-auth, also end PocketID session
  redirectUrl: "https://auth.yourdomain.com/oidc/logout"

defaultPortal: "homarr"

portals:
- name: "homarr"
  displayName: "HTPC"
  providers:
  - pocketID:
      endpoint: "https://auth.yourdomain.com"
      clientID: "from pocketid config"
      clientSecret: "from pocketid config"
      scopes: "openid profile email groups"
      enablePKCE: true
